{% extends 'books/base.html' %}

{% block content %}

<div class="card shadow p-4">
    <h3>Edit Book</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Title</label>
            <input type="text" name="title" value="{{ book.title }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Author</label>
            <input type="text" name="author" value="{{ book.author }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>ISBN</label>
            <input type="text" name="isbn" value="{{ book.isbn }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input type="text" name="category" value="{{ book.category }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Published Date</label>
            <input type="date" name="published_date" value="{{ book.published_date }}" class="form-control">
        </div>

        <button class="btn btn-success">Update</button>
        <a href="{% url 'book_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
